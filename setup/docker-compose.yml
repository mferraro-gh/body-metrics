version: "3.9"

services:
  backend:
    build:
      context: ../backend
    ports:
      - "8000:8000"
    volumes:
      - body_metrics_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
    ports:
      - "5173:5173"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  body_metrics_data:
